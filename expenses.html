<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ishaka Finance Hub - Expenses</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body id="expenses-page">

    <!-- Same header as index.html – copy from above or make a shared header.html later -->
    <header class="header">
        <div class="container">
            <div class="logo">Ishaka <span>Finance</span></div>
            <button class="menu-toggle" aria-label="Toggle menu"><i class="fas fa-bars"></i></button>
            <nav class="nav">
                <ul class="nav-list">
                    <li><a href="index.html"><i class="fas fa-home"></i> Home</a></li>
                    <li><a href="expenses.html" class="active"><i class="fas fa-receipt"></i> Expenses</a></li>
                    <li><a href="budget.html"><i class="fas fa-chart-pie"></i> Budget</a></li>
                    <li><a href="invoices.html"><i class="fas fa-file-invoice"></i> Invoices</a></li>
                    <li><a href="contact.html"><i class="fas fa-envelope"></i> Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="section">
            <div class="container">
                <h1>Expense Tracker</h1>

                <form id="expense-form" class="form">
                    <div class="form-row">
                        <div>
                            <label>Date</label>
                            <input type="date" id="date" required>
                        </div>
                        <div>
                            <label>Category</label>
                            <select id="category" required>
                                <option value="">Select...</option>
                                <option>Food</option>
                                <option>Transport</option>
                                <option>Utilities</option>
                                <option>Airtime & Data</option>
                                <option>Entertainment</option>
                                <option>Rent</option>
                                <option>Other</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div style="flex: 2;">
                            <label>Description</label>
                            <input type="text" id="description" placeholder="e.g. Bolt ride to VI" required>
                        </div>
                        <div>
                            <label>Amount (₦)</label>
                            <input type="number" id="amount" min="1" step="1" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">Add Expense</button>
                </form>

                <h2>Your Expenses</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Category</th>
                            <th>Description</th>
                            <th>Amount</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="expense-list"></tbody>
                    <tfoot>
                        <tr>
                            <td colspan="3"><strong>Total</strong></td>
                            <td><strong id="total-expenses">₦0</strong></td>
                            <td></td>
                        </tr>
                    </tfoot>
                </table>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>© 2026 Ishaka Finance Hub</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
